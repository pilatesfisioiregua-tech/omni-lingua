<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Omni-Lingua</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        background: #f0eee6;
        color: #1f1c18;
        width: 260px;
        padding: 16px;
        margin: 0;
      }
      h1 {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 18px;
        margin: 0 0 8px 0;
        color: #cc785c;
      }
      .stat {
        background: #faf8f2;
        border: 1px solid #e5e2d6;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }
      .big {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 32px;
        font-weight: 600;
      }
      .caption {
        font-size: 11px;
        color: #4a4640;
      }
      a {
        display: inline-block;
        background: #cc785c;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Omni-Lingua</h1>
    <p class="caption">Subtitle Companion · Refold/MIA sentence mining</p>
    <div class="stat">
      <div class="big" id="count">—</div>
      <div class="caption">palabras conocidas</div>
    </div>
    <p class="caption">Click sobre palabras coral en subtítulos para añadirlas a tu deck.</p>
    <a href="https://omni-lingua-pilatesfisioiregua-techs-projects.vercel.app" target="_blank">Abrir Omni-Lingua →</a>
    <script src="popup.js"></script>
  </body>
</html>
